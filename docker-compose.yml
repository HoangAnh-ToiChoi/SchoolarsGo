# ============================================================
# SCHOLARSGO — Docker Compose
# Chạy PostgreSQL + pgAdmin4 để xem database local
# ============================================================

services:
  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: scholarsgo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scholarsgo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: scholarsgo_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/1_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scholarsgo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # pgAdmin4 — Giao diện web quản lý DB
  # Truy cập: http://localhost:5050
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: scholarsgo_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@scholarsgo.com
      PGADMIN_DEFAULT_PASSWORD: scholarsgo_admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
