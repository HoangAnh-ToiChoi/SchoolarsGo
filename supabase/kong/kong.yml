_format_version: "3.0"
_transform: true

services:
  # ─── PostgREST ───
  - name: postgrest
    url: http://rest:3000/
    routes:
      - name: rest-route
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors

  # ─── GoTrue Auth ───
  - name: gotrue
    url: http://gotrue:9999/
    routes:
      - name: gotrue-route
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors

  # ─── Storage ───
  - name: storage
    url: http://storage:5000/
    routes:
      - name: storage-route
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors

  # ─── PostgreSQL Meta ───
  - name: meta
    url: http://meta:8080/
    routes:
      - name: meta-route
        strip_path: true
        paths:
          - /pg/

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - apikey
        - Prefer
      exposed_headers:
        - X-Total-Count
        - Content-Range
        - Range
      credentials: true
      max_age: 3600
